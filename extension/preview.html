<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sovereign Preview - Media Sniffer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');

    :root {
      --gold: #FFD700;
      --gold-dark: #B8860B;
      --bg: #0a0a0a;
      --card-bg: rgba(255, 255, 255, 0.03);
      --glass: rgba(255, 255, 255, 0.05);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: white;
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    #player-container {
      position: relative;
      width: 90%;
      height: 80vh;
      background: #000;
      border: 1px solid var(--gold-dark);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      outline: none;
    }

    #info-bar {
      width: 90%;
      margin-top: 20px;
      padding: 15px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      border-left: 4px solid var(--gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-weight: 700;
      font-size: 18px;
      color: var(--gold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }

    .status {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      background: var(--gold);
      color: black;
      border: none;
      padding: 8px 12px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 12px;
      z-index: 100;
      transition: transform 0.2s;
    }

    .close-btn:hover {
      transform: scale(1.05);
    }

    #error-msg {
      display: none;
      color: #ff4444;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.close()">✕</button>

  <div id="player-container">
    <video id="video-player" controls crossorigin="anonymous"></video>
    <div id="error-msg">Failed to load media. Signature or CORS restriction.</div>
  </div>

  <div id="info-bar">
    <div class="title" id="video-title">Loading Stream...</div>
    <div class="status" id="video-status">Detecting Format</div>
  </div>

  <script src="hls.min.js"></script>
  <script src="dash.all.min.js"></script>
  <script src="preview.js"></script>
</body>
</html>
