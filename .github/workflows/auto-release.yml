name: Auto Release (Version Driven)

on:
  push:
    branches:
      - master
    paths:
      - 'extension/manifest.json'

permissions:
  contents: write

jobs:
  auto-tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git Tag (If Missing)
        id: create_tag
        run: |
          VERSION=$(grep '"version":' extension/manifest.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
          TAG="v$VERSION"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release Zip
        run: |
          zip -r media-sniffer-vibe-v${{ env.VERSION }}.zip extension/ README.md LICENSE PRIVACY_POLICY.md

      - name: Sync GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: media-sniffer-vibe-v${{ env.VERSION }}.zip
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
